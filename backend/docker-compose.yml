version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: moviebooking_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moviebooking
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: